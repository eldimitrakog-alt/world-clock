<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select id="city">
        <option value="">Select a city..</option>
        <option value="Europe/Berlin">Berlin 🇩🇪</option>
        <option value="Indian/Maldives">Maldives 🇲🇻</option>
        <option value="Pacific/Galapagos">Galapagos 🇺🇿</option>
      </select>
      <div id="cities">
      <div class="city" id="athens"/>
        <div>
          <h2>Athens 🇬🇷</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
      <div class="city" id="hanoi"/>
        <div>
          <h2>Hanoi 🇻🇳</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
      <div class="city" id="santiago">
        <div>
          <h2>Santiago 🇨🇱</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
    </div>
    </div>
    <footer>
      This project was coded by
      <a href="https://github.com/eldimitrakog-alt" target="_blank">Elisavet Dimitrakogianni</a>
      is open-sourced on
      <a href="https://github.com/eldimitrakog-alt/world-clock" target="_blank">GitHub</a >
      and is hosted on
      <a href="https://my-worldclockproject.netlify.app/" target="_blank">Netlify</a>
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>

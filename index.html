    <title>World Clock</title>
</head>
<body>
    <div class="container">
    <h1>World Clock</h1>
    <select>
        <option value="">Select a city..</option>

        <option value="">New York</option>
        <option value="">Auckland</option>
      </select>
      <div class="city">
        <h2>Athens 🇬🇷</h2>
        <div class="date">August 15th 2022</div>

      </div>
      <div class="city">
        <h2>Hanoi 🇻🇳</h2>
        <div class="date">August 15th 2022</div>
        <div class="time">1:48:15 AM</div>
        </div>
        <div class="city">
        <h2>Santiago 🇨🇱</h2>
        <div class="date">August 15th 2022</div>
        <div class="time">1:48:15 AM</div>
      </div>
      </div>
